version: "3.8"

services:
  localstack:
    image: localstack/localstack-pro:latest
    container_name: cloud-bank-localstack
    ports:
      - "4566:4566"       # Main LocalStack endpoint
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:? }
      - SERVICES=s3,dynamodb,lambda,sqs,sns,rds,iam,apigateway,cloudwatch,logs,ec2,secretsmanager,ssm,sts,cognito-idp,route53,elbv2,wafv2,acm,kms,cloudtrail,glue,elasticache,backup,guardduty
      - DEFAULT_REGION=ap-southeast-1
      - AWS_DEFAULT_REGION=ap-southeast-1
      - DEBUG=0
      - PERSISTENCE=0
      - ENFORCE_IAM=1
      - IAM_POLICY_ENFORCEMENT_MODE=strict
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Mock service for Cognito (being replaced with native LocalStack Cognito in Phase 2)
  # Keeping this temporarily for backward compatibility with auth service implementation
  mock-auth:
    build: ./services/auth
    container_name: cloud-bank-mock-auth
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - JWT_SECRET=local-dev-secret-change-in-prod
    restart: on-failure

  mock-email:
    build: ./services/notifications
    container_name: cloud-bank-mock-email
    ports:
      - "5004:5004"        # Changed from 5002 to avoid port conflicts
    environment:
      - PORT=5004
      - LOG_EMAILS=true
    restart: on-failure

  mock-kyc:
    build: ./services/kyc
    container_name: cloud-bank-mock-kyc
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
    restart: on-failure

  mongodb:
    image: mongo:7
    container_name: cloud-bank-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=cloudbank
    restart: on-failure

networks:
  default:
    name: cloud-bank-network
