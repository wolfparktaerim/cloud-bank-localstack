name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: input
    id: module
    attributes:
      label: Affected module / service
      placeholder: "e.g. terraform/modules/database or services/auth"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run bootstrap.sh
        2. Apply terraform
        3. Call endpoint X
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      render: shell
